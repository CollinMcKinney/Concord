services:
  redis:
    image: docker.io/library/redis:8.6.1-alpine

    container_name: redis
    command: redis-server --port ${REDIS_PORT} # Needed if REDIS_PORT is changed from 6379 in .env
    ports: # Bind Redis to localhost only so it's accessible from the host machine
      # for debugging, but not exposed to the public network. Both host and 
      # container use the same port number (from .env). Other containers
      # communicate via the internal Compose network using the service name.
      - 127.0.0.1:${REDIS_PORT}:${REDIS_PORT}
    restart: unless-stopped

  concord:
    image: docker.io/library/node:24.14.0-alpine
    container_name: concord
    working_dir: /app
    command: node bootstrap.js
    environment:
      - CONTAINER=true
    depends_on:
      - redis
    env_file:
      - .env
    ports:
      - ${API_PORT}:${API_PORT}
    volumes:
      # Container only
      # - node_modules:/app/node_modules # This one is also shared for development 
      - dist:/app/dist
      - ./node_modules:/app/node_modules:Z # TypeScript static checker needs this host-mounted.
      # Share with host for automatic live nodemon rebuilds.
      - ./.env:/app/.env:Z
      - ./nodemon.json:/app/nodemon.json:Z
      - ./package.json:/app/package.json:Z
      - ./bootstrap.js:/app/bootstrap.js:Z
      - ./tsconfig.json:/app/tsconfig.json:Z
      - ./src:/app/src:Z
      # TODO: using host mounted /data/ to easily share its contents with host.
      # consider that this will be frequently accessed and that using container volumes 
      # in production is likely better performance. Maybe we can add a "download data"
      # button to the admin panel under System, only available to the root user that
      # allows the host OS to download the  folder through their network bridge with the container.
      - ./data:/app/data:Z
    restart: unless-stopped

  caddy:
    image: docker.io/library/caddy:2.11.2-alpine
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      - concord 
    
volumes:
  node_modules: {}
  dist: {}
  caddy_data: {}
  caddy_config: {}
