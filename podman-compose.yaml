services:
  redis:
    image: docker.io/library/redis:8.6.1-trixie
    container_name: redis
    ports: # Bind Redis to localhost only so it's accessible from the host machine
      # for debugging, but not exposed to the public network. Both host and 
      # container use the same port number (from .env). Other containers
      # communicate via the internal Compose network using the service name.
      - 127.0.0.1:${REDIS_PORT}:${REDIS_PORT}
    restart: unless-stopped

  concord:
    image: docker.io/library/node:24.14.0-trixie-slim
    container_name: concord
    working_dir: /app
    command: node setup.js
    depends_on:
      - redis
    env_file:
      - .env
    ports:
      - ${API_PORT}:${API_PORT}
    volumes:
      - node_modules:/app/node_modules   # container-only dependencies
      - ./.env:/app/.env:Z
      - ./nodemon.json:/app/nodemon.json:Z
      - ./package.json:/app/package.json:Z
      - ./setup.js:/app/setup.js:Z       # host file mounted inside container
      - ./src:/app/src:Z                 # host code for live updates
      - ./data:/app/data:Z               # optional data folder
    restart: unless-stopped
    
volumes:
  node_modules: {}