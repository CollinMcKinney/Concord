<!-- Packets/Audit Logs View -->
<div class="content-panel-header">
  <h2 class="content-panel-title">📋 Audit Logs <span class="compact-badge compact-badge-status" id="packets-total-count">0 total</span></h2>
  <div class="content-panel-actions">
    <button type="button" class="primary-button" data-action="open-add-packet" title="Create a new packet">+ Add Packet</button>
    <button type="button" class="secondary-button" data-action="refresh" title="Reload this view">↻ Refresh</button>
  </div>
</div>

<div class="content-panel-body">
  <div id="packets-category-tabs" style="display: flex; gap: 8px; margin-bottom: 12px; border-bottom: 1px solid var(--line); padding-bottom: 8px; flex-wrap: wrap;"></div>
  
  <div style="margin-bottom: 16px;">
    <input type="text" id="packets-search-input" placeholder="Search packets..." data-action="search-packets" autocomplete="off" style="width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(7, 15, 11, 0.86); color: var(--text); font: inherit; font-size: 0.9rem;">
  </div>
  
  <div id="packets-subcategory-tabs" style="display: none; gap: 6px; margin-bottom: 16px; padding-left: 8px; flex-wrap: wrap;"></div>
  <div id="packets-results"></div>
</div>
