<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Concord Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<style>
body { margin:0; padding:0; background:#121212; font-family:'Segoe UI',sans-serif; color:#BADA55; text-align:center; overflow-x:hidden; }
.brazier-container { position:fixed; top:100px; width:220px; height:400px; z-index:0; }
#flameLeftContainer { left:50px; } #flameRightContainer { right:50px; } .flameCanvas { width:100%; height:100%; display:block; }
header { position:relative; background:rgba(20,20,20,0.9); margin:20px auto; padding:20px; max-width:900px; border-radius:10px; box-shadow:0 0 40px rgba(0,255,128,0.2), 0 0 80px rgba(0,255,128,0.1); z-index:1; }
header h1 { font-size:3em; font-family:'Fredoka One', cursive; color:#BADA55; text-shadow:0 0 5px rgba(0,255,255,0.3); margin:0; }
.container { position:relative; z-index:1; max-width:900px; margin:0 auto; display:flex; flex-direction:column; gap:20px; padding-top:30px; }
.login-card { display:flex; justify-content:center; flex-wrap:wrap; gap:20px; background:rgba(30,30,30,0.9); padding:20px 30px; border-radius:10px; box-shadow:0 0 40px rgba(0,255,128,0.15),0 0 80px rgba(0,255,128,0.1); }
.login-card label { font-weight:bold; flex:1 1 200px; text-align:center; }
.login-card input { padding:8px; border-radius:5px; border:1px solid #555; background:#121212; color:#BADA55; width:220px; text-align:center; }
.command-panel { display:flex; flex-direction:column; align-items:center; gap:10px; background:rgba(30,30,30,0.9); padding:20px; border-radius:10px; box-shadow:0 0 40px rgba(0,255,128,0.15),0 0 80px rgba(0,255,128,0.1); }
.command-panel select, .command-panel input[type=text] { padding:10px; border-radius:5px; border:1px solid #555; background:#121212; color:#BADA55; text-align:center; flex:1; }
.command-panel button { cursor:pointer; font-weight:bold; transition:0.2s; background:#555; padding:10px 20px; border-radius:5px; }
.command-panel button:hover { background:#0F0; color:#121212; }
.command-panel button:active { background:#BADA55; color:#121212; transform:scale(0.95); }
.result-box { width:100%; max-width:900px; min-height:400px; padding:15px; border-radius:10px; border:1px solid #555; color:#BADA55; overflow-y:auto; white-space:pre-wrap; font-family:monospace; text-align:left; background:rgba(30,30,30,0.85); box-shadow:0 0 20px rgba(0,255,128,0.15); }
</style>
</head>
<body>

<div id="flameLeftContainer" class="brazier-container">
  <canvas id="flameLeft" class="flameCanvas"></canvas>
</div>
<div id="flameRightContainer" class="brazier-container">
  <canvas id="flameRight" class="flameCanvas"></canvas>
</div>

<header><h1>Concord Dashboard</h1></header>

<div class="container">
  <div class="login-card">
    <label>ROOT Credentials: <input type="text" id="rootCredentials" placeholder="Paste ROOT_CREDENTIALS"></label>
  </div>

  <div class="command-panel">
    <select id="commandSelect"></select>
    <div id="argsInputContainer" style="display:flex; flex-wrap:wrap; gap:10px;"></div>
    <button id="callButton">Run Command</button>
  </div>

  <div class="result-box" id="resultBox">Result will appear here...</div>
</div>

<script>
// ---------------- Admin Functions ----------------
const adminFunctions = [
  {name:"authenticate", description:"Authenticate a user"},
  {name:"verifySession", description:"Verify a session token"},
  {name:"saveState", description:"Save application state"},
  {name:"loadState", description:"Load application state"},
  {name:"addPacket", description:"Add a packet"},
  {name:"getPackets", description:"Get all packets"},
  {name:"deletePacket", description:"Delete a packet"},
  {name:"editPacket", description:"Edit a packet"},
  {name:"createUser", description:"Create a user"},
  {name:"listUsers", description:"List all users"},
  {name:"getUser", description:"Get a specific user"},
  {name:"setRole", description:"Set a user role"},
  {name:"setEnvVar", description:"Set an environment variable"},
  {name:"getSuppressedPrefixes", description:"Get suppressed message rules"},
  {name:"setSuppressedPrefixes", description:"Set suppressed message rules"},
  {name:"getCommandRoleRequirements", description:"Get command role requirements"},
  {name:"setCommandRoleRequirement", description:"Set a command role requirement"}
];

const adminFunctionParameters = {
  authenticate: [], verifySession: [], saveState: [], loadState: [],
  addPacket: ["text body"], getPackets: ["limit (default 50)"],
  deletePacket: ["packetID"], editPacket: ["packetID","text body"],
  createUser: ["newUserData"], listUsers: [], getUser: ["targetUserID"],
  setRole: ["targetUserID","newRole"],
  setEnvVar: ["ENV_KEY","value"],
  getSuppressedPrefixes: [],
  setSuppressedPrefixes: ["JSON array of contains strings or /regex/flags rules"],
  getCommandRoleRequirements: [],
  setCommandRoleRequirement: ["commandName","roleName (ex: MEMBER) or OPEN"]
};

// Populate dropdown
const commandSelect = document.getElementById("commandSelect");
adminFunctions.forEach(f => {
  const opt = document.createElement("option");
  opt.value = f.name;
  opt.textContent = `${f.name} — ${f.description}`;
  commandSelect.appendChild(opt);
});

// Dynamic args
const argsInputContainer = document.getElementById("argsInputContainer");
function updateParameterInputs() {
  const command = commandSelect.value;
  argsInputContainer.innerHTML = "";
  const params = adminFunctionParameters[command] || [];
  params.forEach(param => {
    const input = document.createElement("input");
    input.type = "text"; input.placeholder = param;
    input.dataset.paramName = param; input.style.flex = "1";
    argsInputContainer.appendChild(input);
  });
}
updateParameterInputs();
commandSelect.addEventListener("change", updateParameterInputs);

// ---------------- Execute Command ----------------
const callButton = document.getElementById("callButton");
const resultBox = document.getElementById("resultBox");
const rootCredentialsField = document.getElementById("rootCredentials");

function extractCombinedCredentials(rawValue) {
  const value = rawValue.trim();
  const normalized = value.startsWith("ROOT_CREDENTIALS=")
    ? value.slice("ROOT_CREDENTIALS=".length).trim()
    : value;
  const parts = normalized.split("=");

  if (parts.length < 2) {
    return { userID: "", sessionToken: "" };
  }

  return {
    userID: parts[0].trim(),
    sessionToken: parts.slice(1).join("=").trim(),
  };
}

callButton.addEventListener("click", async () => {
  const functionName = commandSelect.value;
  if(!functionName){ alert("Select a command"); return; }

  const { userID, sessionToken } = extractCombinedCredentials(rootCredentialsField.value);
  if(!userID || !sessionToken){ alert("Enter your combined ROOT credentials"); return; }

  const paramInputs = argsInputContainer.querySelectorAll("input");
  const args = Array.from(paramInputs).map(i=>{
    const val=i.value.trim(); if(!val) return val;
    try{return JSON.parse(val);}catch{return val;}
  });

  let fullArgs = [userID, sessionToken, ...args];

  // Automatically append actorDetails for addPacket
  if(functionName === "addPacket") {
    fullArgs.push({ name: "ROOT", roles: [], permissions: [] });
  }

  try{
    const response = await fetch("/admin/call", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({functionName,args:fullArgs})
    });
    const data = await response.json();
    resultBox.textContent = JSON.stringify(data,null,2);
  }catch(err){
    resultBox.textContent = "Error: "+err.message;
  }
});

// ---------------- Brazier Flames (unchanged) ----------------
function initRSBrazier(canvas){
  const ctx = canvas.getContext('2d'); canvas.width=canvas.offsetWidth; canvas.height=canvas.offsetHeight;
  const particles=[], smoke=[];
  function drawBrazier(){ const cx=canvas.width/2,cy=canvas.height-50; ctx.fillStyle="#222"; ctx.fillRect(cx-60,cy+50,120,20); const legW=6,legH=150,spacing=10; ctx.fillStyle="#444"; ctx.fillRect(cx-spacing*1,cy-legH+20,legW,legH); ctx.fillRect(cx-spacing*0,cy-legH+20,legW,legH); ctx.fillRect(cx+spacing*1,cy-legH+20,legW,legH); const potY=cy-legH; ctx.beginPath(); ctx.moveTo(cx-40,potY); ctx.quadraticCurveTo(cx,potY-50,cx+40,potY); ctx.closePath(); ctx.fillStyle="#333"; ctx.fill(); ctx.strokeStyle="#555"; ctx.stroke(); const grad=ctx.createRadialGradient(cx,potY-25,5,cx,potY-25,35); grad.addColorStop(0,'rgba(0,255,0,0.7)'); grad.addColorStop(0.5,'rgba(0,200,0,0.4)'); grad.addColorStop(1,'rgba(0,100,0,0.1)'); ctx.fillStyle=grad; ctx.fill();}
  function createParticle(){ const cx=canvas.width/2,cy=canvas.height-50-150,x=cx+(Math.random()*30-15),y=cy,size=Math.random()*8+4,speed=Math.random()*1+0.5,colorArr=[`rgba(0,255,0,0.6)`,`rgba(0,200,0,0.4)`,`rgba(0,150,0,0.3)`],color=colorArr[Math.floor(Math.random()*colorArr.length)]; particles.push({x,y,size,speed,color,angle:Math.random()*Math.PI*2});}
  function createSmoke(){ const cx=canvas.width/2,cy=canvas.height-50-150,x=cx+(Math.random()*20-10),y=cy,size=Math.random()*15+10; smoke.push({x,y,size,alpha:0.1+Math.random()*0.2});}
  function update(){ ctx.clearRect(0,0,canvas.width,canvas.height); drawBrazier();
    for(let i=particles.length-1;i>=0;i--){ const p=particles[i]; p.y-=p.speed; p.x+=Math.sin(p.angle)*0.5; p.size*=0.97; p.angle+=0.05; ctx.beginPath(); ctx.fillStyle=p.color; ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill(); if(p.size<1||p.y<0) particles.splice(i,1);} 
    if(particles.length<80) createParticle();
    for(let i=smoke.length-1;i>=0;i--){ const s=smoke[i]; s.y-=0.3; s.alpha*=0.99; ctx.beginPath(); ctx.fillStyle=`rgba(200,200,200,${s.alpha})`; ctx.arc(s.x,s.y,s.size,0,Math.PI*2); ctx.fill(); if(s.alpha<0.01) smoke.splice(i,1);}
    if(smoke.length<30) createSmoke(); requestAnimationFrame(update);
  }
  update();
}
initRSBrazier(document.getElementById('flameLeft'));
initRSBrazier(document.getElementById('flameRight'));
</script>

</body>
</html>
